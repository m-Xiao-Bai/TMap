services:

  mysql:
    image: mysql:8.0
    container_name: tmap-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: transit_map
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tmap-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-server:
    build:
      context: ../TransitMap-java
      dockerfile: ../docker/Dockerfile.backend
      args:
        MODULE_NAME: TransitMap-admin-server
    container_name: tmap-admin-server
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: transit_map
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GAODE_API_KEY: ${GAODE_API_KEY}
      MAIL_HOST: smtp.qq.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      DATA_DIR: /app/data
    ports:
      - "8889:8889"
    volumes:
      - app_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-server:
    build:
      context: ../TransitMap-java
      dockerfile: ../docker/Dockerfile.backend
      args:
        MODULE_NAME: TransitMap-user-server
    container_name: tmap-user-server
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: transit_map
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: smtp.qq.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      WECHAT_APPID: ${WECHAT_APPID}
      WECHAT_SECRET: ${WECHAT_SECRET}
      DATA_DIR: /app/data
    ports:
      - "8888:8888"
    volumes:
      - app_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  python-service:
    build:
      context: ../TransitMap-python
      dockerfile: Dockerfile
    container_name: tmap-python
    restart: always
    env_file:
      - ../TransitMap-python/.env
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USERNAME}:${DB_PASSWORD}@mysql:3306/transit_map
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JAVA_INTERNAL_API_URL: http://user-server:8888/transitMap/api/internal
      PYTHON_SERVICE_API_KEY: ${PYTHON_SERVICE_API_KEY}
      AMAP_API_KEY: ${GAODE_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: tmap-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../TransitMap-vue-user/dist:/usr/share/nginx/html/user:ro
      - ../TransitMap-vue-admin/dist:/usr/share/nginx/html/admin:ro
    depends_on:
      - admin-server
      - user-server
      - python-service

volumes:
  mysql_data:
  redis_data:
  app_data:
