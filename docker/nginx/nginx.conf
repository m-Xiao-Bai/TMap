server {
    listen       80;
    server_name  _;

    # ========== 用户端前端 ==========
    location / {
        root   /usr/share/nginx/html/user;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # 用户端 API 代理
    location /transitMap/ {
        proxy_pass http://user-server:8888/transitMap/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 代理（AI 聊天）
    location /transitMap/ws/ {
        proxy_pass http://user-server:8888/transitMap/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ========== 管理端前端 ==========
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 管理端 API 代理
    location /transitMap-admin/ {
        proxy_pass http://admin-server:8889/transitMap-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 管理端 /data 代理
    location /data/ {
        proxy_pass http://admin-server:8889/data/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
